apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html
  template:
    metadata:
      labels:
        app: simple-html
    spec:
      containers:
      - name: simple-html
        image: subhamdevbehera/simple-html:10
        ports:
        - containerPort: 80